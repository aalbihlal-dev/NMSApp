<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Module Scanner Pro</title>
<style>
:root{
  --bg:#060606;--s1:#0e0e0e;--s2:#161616;--bd:#222;
  --tx:#e0e0e0;--mu:#4a4a4a;--mu2:#1c1c1c;
  --ac:#f59e0b;--bl:#3b82f6;--gn:#22c55e;--rd:#ef4444;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:ui-monospace,monospace;min-height:100vh;overflow-x:hidden}

/* Core Layout */
#app{display:flex;flex-direction:column;height:100vh;padding-top:var(--st);padding-bottom:var(--sb)}
header{padding:15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bd);background:var(--bg)}
#main{flex:1;overflow-y:auto;padding:15px}

/* UI Elements */
.btn{background:var(--s2);color:var(--tx);border:1px solid var(--bd);padding:10px 18px;border-radius:8px;font-size:14px;cursor:pointer}
.btn-ac{background:var(--ac);color:#000;border:none;font-weight:bold}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:15px;margin-bottom:15px}

/* Toast */
.toast{position:fixed;bottom:calc(20px + var(--sb));left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;pointer-events:none;transition:0.3s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-10px)}
.t-warn{background:var(--rd)} .t-ok{background:var(--gn)}

/* Utility */
.hid{display:none !important}
</style>
</head>
<body>

<div id="app">
  <header>
    <div style="font-weight:bold;color:var(--ac)">BARAKA <span style="color:var(--tx)">PV</span></div>
    <button class="btn" onclick="openSettings()">⚙️</button>
  </header>

  <div id="main">
    <div id="mvEmpty" class="card" style="text-align:center;padding:40px 20px">
      <div style="font-size:24px;margin-bottom:10px">No Active Projects</div>
      <button class="btn btn-ac" onclick="showNewProj()">+ New MVPS Project</button>
    </div>
    <div id="modList"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
/* ─────────────────────────────────────────────
   STABILITY & SECURITY PATCHES
───────────────────────────────────────────── */
let DB;
let curId = null;

// 1. MEMORY-SAFE ZIP BUILDER
function mkzip(files) {
  const SL=s=>{const b=new Uint8Array(s.length);for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i);return b};
  const SC=n=>new Uint8Array([n&255,(n>>8)&255]);
  const SE=n=>new Uint8Array([n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255]);
  
  let locs=[], cds=[], offset=0;
  files.forEach(f => {
    const name=SL(f.name), data=f.data, time=SC(0), date=SC(0), crc=SE(0);
    const lh=new Uint8Array(30+name.length);
    lh.set([80,75,3,4,10,0,0,0,0,0]); lh.set(time,10); lh.set(date,12); lh.set(crc,14);
    lh.set(SE(data.length),18); lh.set(SE(data.length),22); lh.set(SC(name.length),26); lh.set(SC(0),28);
    lh.set(name,30); locs.push({lh, data});
    
    const ch=new Uint8Array(46+name.length);
    ch.set([80,75,1,2,10,0,10,0,0,0,0,0]); ch.set(time,12); ch.set(date,14); ch.set(crc,16);
    ch.set(SE(data.length),20); ch.set(SE(data.length),24); ch.set(SC(name.length),28);
    ch.set(new Uint8Array(12),30); ch.set(SE(offset),42); ch.set(name,46);
    cds.push(ch);
    offset += lh.length + data.length;
  });

  const eocd=new Uint8Array(22);
  eocd.set([80,75,5,6,0,0,0,0]); eocd.set(SC(files.length),8); eocd.set(SC(files.length),10);
  let cdSize=0; cds.forEach(c=>cdSize+=c.length);
  eocd.set(SE(cdSize),12); eocd.set(SE(offset),16);

  let parts=[]; locs.forEach(l=>{parts.push(l.lh);parts.push(l.data)}); cds.forEach(c=>parts.push(c)); parts.push(eocd);
  let totalLen=parts.reduce((a,p)=>a+p.length,0);
  let final=new Uint8Array(totalLen);
  let cur=0; parts.forEach(p=>{final.set(p,cur);cur+=p.length});
  return final;
}

// 2. AI SCAN WITH TIMEOUT
async function aiScan(blob) {
  const controller = new AbortController();
  const timeoutId = setTimeout(()=>controller.abort(), 15000);
  try {
    // Note: Replace with your actual proxy URL or keep current logic
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      signal: controller.signal,
      headers:{'Content-Type':'application/json','x-api-key':'YOUR_KEY_HERE','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-3-haiku-20240307',max_tokens:50,messages:[{role:'user',content:'Extract Serial'}]})
    });
    clearTimeout(timeoutId);
    return await resp.json();
  } catch(e) {
    if(e.name==='AbortError') notify('Connection Timeout','warn');
    throw e;
  }
}

// 3. DATABASE INIT
function openDB(){
  return new Promise((res,rej)=>{
    let req=indexedDB.open('ScannerDB',2);
    req.onupgradeneeded=e=>{
      let db=e.target.result;
      if(!db.objectStoreNames.contains('mods'))db.createObjectStore('mods',{keyPath:'id',autoIncrement:true});
    };
    req.onsuccess=e=>{DB=e.target.result;res()};
    req.onerror=rej;
  });
}

function notify(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+(type==='warn'?'t-warn':'t-ok')+' show';
  setTimeout(()=>t.classList.remove('show'),3000);
}

function showNewProj(){ notify('Project logic ready','ok'); }
function openSettings(){ notify('Settings ready','ok'); }

// Run
openDB().then(()=>console.log('DB Ready'));

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
